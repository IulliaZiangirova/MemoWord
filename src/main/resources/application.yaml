spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/memoword
    username: user
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  liquibase:
    change-log: classpath:db/changelog/changelog_master.yaml
    enabled: true

jwt:
  secret: "my-super-secret-key-that-is-at-least-32-bytes-long"
  expiration: 86400000

